---
# Synthetic Cardigann definition — exercises the parser surfaces a
# real wide-coverage tracker hits (wide caps + categorymappings,
# multi-mode `modes`, ordered `search.fields`, multi-step
# `download.selectors`, settings with select/text/info widgets,
# headers + keywordsfilters). Doesn't represent any real tracker.
# See ./README.md for why we ship synthetic fixtures rather than
# vendored real-world ones.
id: synthetic-tracker
name: SyntheticTracker
description: "Synthetic Cardigann definition for parser regression tests"
language: en-US
type: public
encoding: UTF-8
requestDelay: 2
links:
  - https://example.invalid/
  - https://alt.example.invalid/
legacylinks:
  - https://old.example.invalid/

caps:
  categorymappings:
    # Anime
    - {id: 28, cat: TV/Anime, desc: "Anime/Anime"}
    # Audio
    - {id: 22, cat: Audio/MP3, desc: "Music/MP3"}
    - {id: 23, cat: Audio/Lossless, desc: "Music/Lossless"}
    - {id: 53, cat: Audio, desc: "Music/Album"}
    # Movies
    - {id: 1, cat: Movies/DVD, desc: "Movies/DVD"}
    - {id: 2, cat: Movies/SD, desc: "Movies/SD"}
    - {id: 42, cat: Movies/HD, desc: "Movies/HD"}
    - {id: 70, cat: Movies/HD, desc: "Movies/HEVC/x265"}
    - {id: 76, cat: Movies/UHD, desc: "Movies/UHD"}
    # TV
    - {id: 5, cat: TV, desc: "TV/DVD"}
    - {id: 41, cat: TV/HD, desc: "TV/HD"}
    - {id: 71, cat: TV, desc: "TV/HEVC/x265"}
    - {id: 9, cat: TV/Documentary, desc: "TV/Documentary"}
    # Apps
    - {id: 18, cat: PC, desc: "Apps/PC Software"}
    - {id: 19, cat: PC/Mac, desc: "Apps/Mac"}
    - {id: 20, cat: PC, desc: "Apps/Linux"}
    # Games
    - {id: 10, cat: PC/Games, desc: "Games/PC Game"}
    - {id: 77, cat: Console/PS4, desc: "Games/PS4"}
    - {id: 82, cat: Console/Other, desc: "Games/Switch"}
    # Other
    - {id: 33, cat: Other, desc: "Other/Misc"}
    - {id: 36, cat: Books/EBook, desc: "Other/E-books"}
    - {id: 40, cat: Other/Misc, desc: "Other/Other"}
    - {id: 52, cat: Audio/Audiobook, desc: "Other/Audiobook"}

  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]
    music-search: [q]
    book-search: [q]
  allowrawsearch: true

settings:
  - name: uploader
    type: text
    label: Filter by Uploader
  - name: info_uploader
    type: info
    label: About filtering by Uploader
    default: "Enter a case-sensitive username, or leave empty to get all results."
  - name: downloadlink
    type: select
    label: Download link
    default: "magnet:"
    options:
      "magnet:": magnet
      "http://torrent-cache.example.invalid/": fallback
  - name: sort
    type: select
    label: Sort requested from site
    default: time
    options:
      time: created
      seeders: seeders
      size: size
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc

download:
  # Two-step selector chain — the .torrent / magnet URL lives on the
  # details page; the parser must walk both selectors in order.
  selectors:
    - selector: ul li a[href^="{{ .Config.downloadlink }}"]
      attribute: href
    - selector: ul li a[href^="magnet:"]
      attribute: href

search:
  paths:
    # Templated path with conditional branches — the parser doesn't
    # render templates here, but it must parse the YAML structure.
    - path: "{{ if .Keywords }}search/{{ .Keywords }}{{ else }}cat/Movies{{ end }}/1/"
    - path: "{{ if .Keywords }}search/{{ .Keywords }}{{ else }}cat/TV{{ end }}/1/"

  keywordsfilters:
    # daily-style "S2024" → "2024" rewrite, exercises the filter list
    - name: re_replace
      args: ["\\bS(20\\d{2})\\b", "$1"]

  rows:
    selector: "tr:has(a[href^=\"/torrent/\"])"

  # Order matters: title_default must come first to exercise the
  # insertion-order assertion in parse_real_synthetic_definition.
  fields:
    title_default:
      selector: td.title a
    title:
      text: "{{ .Result.title_default }}"
      filters:
        - name: replace
          args: ["-", " "]
    category:
      text: "1"
    details:
      selector: td.title a
      attribute: href
    download:
      selector: td.title a
      attribute: href
    date:
      selector: td.date
      filters:
        - name: dateparse
          args: "yyyy-MM-dd"
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    downloadvolumefactor:
      text: 0
    uploadvolumefactor:
      text: 1
