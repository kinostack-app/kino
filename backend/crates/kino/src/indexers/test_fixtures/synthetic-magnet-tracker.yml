---
# Synthetic Cardigann definition exercising the `download.infohash`
# block (extract magnet hash + title from selectors, vs the more
# common `download.selectors` magnet-link extraction). See
# ./README.md for why we ship synthetic fixtures rather than
# vendored real-world ones.
id: synthetic-magnet-tracker
name: SyntheticMagnetTracker
description: "Synthetic DHT-style definition for parser regression tests"
language: en-US
type: public
encoding: UTF-8
links:
  - https://magnet.example.invalid/

caps:
  categorymappings:
    - {id: Other, cat: Other, desc: Other}

  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]
    music-search: [q]
    book-search: [q]

settings:
  - name: info_category_8000
    type: info_category_8000

# `infohash` block (vs the more common `selectors` block) — the
# parser must accept either at the same `download` level.
download:
  infohash:
    hash:
      selector: a[href^="magnet:?xt"]
      attribute: href
      filters:
        - name: regexp
          args: ([A-F|a-f|0-9]{40})
    title:
      selector: input[name="q"]
      attribute: value
      filters:
        - name: validfilename

search:
  paths:
    - path: /
  inputs:
    q: "{{ if .Keywords }}{{ .Keywords }}{{ else }}{{ .Today.Year }}{{ end }}"
    wanted: 100

  headers:
    Referer: ["{{ .Config.sitelink }}"]

  rows:
    selector: table.results > tbody > tr:has(a)
    filters:
      - name: andmatch

  fields:
    category:
      text: Other
    title:
      selector: a
    details:
      selector: a
      attribute: href
    download:
      selector: a
      attribute: href
    date:
      text: now
    files:
      selector: span.label
    size:
      selector: span[id^="size"]
    seeders:
      text: 1
    leechers:
      text: 1
    downloadvolumefactor:
      text: 0
    uploadvolumefactor:
      text: 1
