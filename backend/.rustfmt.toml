# Pin formatter behaviour rather than relying on rustfmt's
# moving defaults. Conservative: stick close to defaults so PRs
# from contributors using a stock toolchain don't get reformatted
# on every save.

# Rustfmt's default is 100; we keep it.
max_width = 100

# `cargo fmt` should match what `just fix-ci` runs.
edition = "2024"

# Stable rustfmt only. Comment-out blocks below are nightly-only —
# leaving them visible documents what we'd want once stable.

# imports_granularity = "Crate"      # nightly
# group_imports = "StdExternalCrate" # nightly
# wrap_comments = true               # nightly
# format_code_in_doc_comments = true # nightly
