name: Channels

# Auxiliary distribution channels. Fires AFTER `release.yml` has
# successfully uploaded all artefacts (archives, MSI, .pkg, .deb,
# .rpm, sha256.sum) to the GitHub Release. Each downstream job
# (winget / AUR / Docker / Pi) is independent: a flake in winget
# doesn't block AUR; a slow Pi image build doesn't delay Docker.
#
# Why `workflow_run` and not `release: published`?
# release-please creates the release object as already-published
# at tag-creation time, before `release.yml` has a chance to upload
# artefacts. The `release: published` event fires on that creation,
# racing the artefact upload — AUR fetched SHA256SUMS during the
# v0.1.0 run before cargo-dist had uploaded it (404). Triggering on
# `release.yml`'s successful completion guarantees artefacts exist.
#
# See `docs/roadmap/21-cross-platform-deployment.md` §7-8.

on:
  # zizmor: ignore[dangerous-triggers]
  # `workflow_run` is genuinely safer than its reputation here:
  # GitHub only ever runs the DEFAULT BRANCH version of channels.yml
  # in response to a workflow_run event (a malicious PR can't poison
  # the trigger), AND the `guard` job filters to
  # `conclusion == success`, `event == push`, and tag-pattern `v*`.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    # Manual re-trigger — handy when AUR SSH or winget validation
    # transiently fails and we want to retry without re-tagging.
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string

# Workflow-level permissions are minimal (least-privilege). Each job
# overrides upward only as needed — see the `permissions:` block on
# each job below.
permissions: {}

# One channels run per tag — re-triggers via `workflow_dispatch` queue
# rather than racing the previous run. Don't cancel-in-progress; a
# half-done channel push leaves a worse state than a delayed one.
concurrency:
  group: channels-${{ github.event.workflow_run.head_branch || inputs.tag }}
  cancel-in-progress: false

env:
  TAG: ${{ github.event.workflow_run.head_branch || inputs.tag }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Single-shot gate. workflow_run fires for every release.yml
  # completion (including dry-runs and failures); we only want
  # to fan out when the triggering run was a successful real tag
  # push. workflow_dispatch always proceeds (manual override).
  # `is_stable` distinguishes vX.Y.Z from vX.Y.Z-rc1 / -alpha etc.
  # so the per-channel pre-release skip is centralised here.
  # ─────────────────────────────────────────────────────────────
  guard:
    name: Guard (filter trigger + derive tag)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.event == 'push' ||
        github.event.workflow_run.event == 'workflow_dispatch') &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      is_stable: ${{ steps.derive.outputs.is_stable }}
    steps:
      - id: derive
        env:
          DERIVED_TAG: ${{ github.event.workflow_run.head_branch || inputs.tag }}
        run: |
          set -euo pipefail
          echo "tag=${DERIVED_TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${DERIVED_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────
  # winget — submits a PR to microsoft/winget-pkgs. Action wraps
  # the wingetcreate manifest generation; the PR is auto-merged
  # by Microsoft's CI within hours if the manifest is well-formed.
  # ─────────────────────────────────────────────────────────────
  winget:
    name: winget
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read   # winget-releaser only needs to read the release
    if: needs.guard.outputs.is_stable == 'true'
    steps:
      # Soft-skip when the publishing PAT isn't configured. Avoids a
      # red "channels run failed" on early releases where the token
      # hasn't been set yet (e.g. pre-org-migration). The job still
      # runs (so it shows up in the summary) but the publish step is
      # bypassed and a notice is logged.
      - name: Check WINGET_TOKEN presence
        id: check
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -n "$WINGET_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=winget submission skipped::WINGET_TOKEN secret not configured. See RELEASING.md to enable."
          fi
      - uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        if: steps.check.outputs.configured == 'true'
        with:
          identifier: kinostack-app.kino
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # AUR — pushes the bumped PKGBUILD + .SRCINFO to the
  # aur.archlinux.org git repo. Two packages: `kino-bin` (this
  # one — pre-built binary) and `kino` (source build, separate
  # PKGBUILD elsewhere; not part of this scaffold).
  # ─────────────────────────────────────────────────────────────
  aur:
    name: AUR (kino-bin)
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read   # SSH key (not GITHUB_TOKEN) pushes to AUR
    if: needs.guard.outputs.is_stable == 'true'
    steps:
      # Soft-skip when the AUR SSH key isn't configured. Same logic
      # as the winget gate — we'd rather a green workflow with a
      # notice than a red one cluttering the channels view.
      - name: Check AUR_SSH_PRIVATE_KEY presence
        id: check
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$AUR_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=AUR submission skipped::AUR_SSH_PRIVATE_KEY secret not configured. See RELEASING.md to enable."
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.check.outputs.configured == 'true'
        with:
          persist-credentials: false

      - name: Bump pkgver and refresh checksums
        if: steps.check.outputs.configured == 'true'
        run: |
          VERSION="${TAG#v}"
          cd packaging/aur
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          # Pull the SHA256s from the release. cargo-dist publishes a
          # single combined `sha256.sum` file alongside the archives
          # (per its `host` step's "announcing" manifest). Each line is
          # `<sha>  <filename>`. Archives are .tar.xz on Linux targets.
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${TAG}/sha256.sum" -o /tmp/sums
          AMD64_SHA=$(grep "kino-x86_64-unknown-linux-gnu.tar.xz" /tmp/sums | awk '{print $1}')
          ARM64_SHA=$(grep "kino-aarch64-unknown-linux-gnu.tar.xz" /tmp/sums | awk '{print $1}')
          if [ -z "$AMD64_SHA" ] || [ -z "$ARM64_SHA" ]; then
            echo "::error::failed to extract SHAs from sha256.sum (release artefacts missing or renamed)"
            cat /tmp/sums
            exit 1
          fi
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${AMD64_SHA}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${ARM64_SHA}')/" PKGBUILD

      - uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        if: steps.check.outputs.configured == 'true'
        with:
          pkgname: kino-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: kinostack-app
          commit_email: noreply@kinostack.app
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "kino-bin ${TAG#v}"
          force_push: false

  # ─────────────────────────────────────────────────────────────
  # Docker / OCI — multi-arch image to ghcr.io. Per-arch native
  # builds (amd64 on standard runner, arm64 on ubuntu-24.04-arm)
  # avoid QEMU emulation overhead. Combined into a multi-arch
  # manifest in the `docker-manifest` job.
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker (${{ matrix.platform }})
    needs: guard
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read     # checkout
      packages: write    # GHCR push
    # Docker images for pre-releases are useful (early-tester pulls);
    # don't gate on `is_stable`. Only requires that the guard ran
    # (i.e. trigger was valid).
    if: needs.guard.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/kino,push-by-digest=true,name-canonical=true,push=true
          # Two-tier cache: GHA scope per-platform for in-CI reuse,
          # plus a registry mirror so anyone building the image
          # outside our CI (forks, local docker buildx, downstream
          # rebuilds) can pull cached layers from GHCR. Cheap to
          # add; ~15 MB extra per release.
          cache-from: |
            type=gha,scope=${{ matrix.platform }}
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/kino:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-to: |
            type=gha,scope=${{ matrix.platform }},mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/kino:buildcache-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }},mode=max

      - name: Export digest
        id: export
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          retention-days: 1

  docker-manifest:
    name: Docker (multi-arch manifest)
    needs: [guard, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read     # download digest artefacts
      packages: write    # write the multi-arch manifest tag to GHCR
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine manifests
        working-directory: /tmp/digests
        run: |
          VERSION="${TAG#v}"
          docker buildx imagetools create \
            --tag "ghcr.io/${{ github.repository_owner }}/kino:${VERSION}" \
            --tag "ghcr.io/${{ github.repository_owner }}/kino:latest" \
            $(printf 'ghcr.io/${{ github.repository_owner }}/kino@sha256:%s ' *)

  # ─────────────────────────────────────────────────────────────
  # Raspberry Pi appliance image. pi-gen builds Pi OS Lite + our
  # stage-kino on top of it inside a QEMU chroot. ~20–30 min
  # wall-clock; uploaded to the GitHub Release alongside the other
  # archives. The Imager Repository JSON served from the
  # kinostack.app site lists the new image automatically once
  # picked up by the next site deploy.
  # ─────────────────────────────────────────────────────────────
  pi-image:
    name: Raspberry Pi appliance image
    needs: guard
    runs-on: ubuntu-latest
    # pi-gen builds Raspberry Pi OS Lite + our stage in QEMU.
    # Wall-clock is 25-40 min when fresh, ~15 min with apt cache hits.
    timeout-minutes: 75
    permissions:
      contents: write   # softprops/action-gh-release attaches the .img.xz
    if: needs.guard.outputs.is_stable == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Stage the aarch64 .deb produced by release.yml into the
      # repo root. pi-gen-action mounts the workspace at /pi-gen/
      # inside its Docker container, so prerun.sh can copy from
      # ${BASE_DIR}/kino.deb into the chroot's /tmp/. Without this
      # step, stage-kino/00-run-chroot.sh fails the file-existence
      # check and pi-gen exits in <1s with status 1.
      - name: Download arm64 .deb from the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "kino_*_arm64.deb" \
            --output kino.deb
          test -f kino.deb
          ls -la kino.deb

      - name: Build kino-rpi-arm64.img.xz
        uses: usimd/pi-gen-action@cec66cba86bdcd23984e6a79ea4e9251d90bc798 # v1
        with:
          stage-list: stage0 stage1 stage2 ./packaging/pi-gen/stage-kino
          image-name: kino
          enable-noobs: false
          compression: xz
          release: trixie
          # Trim build time: skip docs/desktop stages we don't need.
          extra-host-modules: ""
          # Pi-side dependencies are added by stage-kino's 00-packages.

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.TAG }}
          files: "*.img.xz"

  # ─────────────────────────────────────────────────────────────
  # Microsoft Store — submits the MSIX produced by release.yml's
  # `build-msix` job to Partner Center via the official `msstore`
  # CLI (wrapped by microsoft/microsoft-store-apppublisher).
  #
  # IMPORTANT: the FIRST submission for a new product MUST be made
  # manually through Partner Center (Microsoft requirement; the API
  # can only manage submissions on a product that already has one
  # published submission). This job soft-skips when its credentials
  # aren't configured — same pattern as winget / AUR — so v0.1.0
  # ships through manual upload, then once secrets land, v0.2.0+
  # auto-submits.
  #
  # Required state to enable this channel:
  #   - One manual submission of v0.1.0 already published in Store
  #   - Repo SECRETS:   MSSTORE_TENANT_ID, MSSTORE_CLIENT_ID,
  #                     MSSTORE_CLIENT_SECRET, MSSTORE_SELLER_ID
  #   - Repo VARIABLE:  MSSTORE_PRODUCT_ID (public, displayed on
  #                     the Store listing URL — not a secret)
  #
  # See RELEASING.md for the Azure AD app registration setup that
  # produces the four secrets.
  # ─────────────────────────────────────────────────────────────
  msstore:
    name: Microsoft Store
    needs: guard
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    if: needs.guard.outputs.is_stable == 'true'
    steps:
      # Soft-skip when any of the four secrets OR the product-id
      # variable isn't configured. Mirrors the winget / AUR gate
      # pattern at the top of this file.
      - name: Check Microsoft Store credentials presence
        id: check
        env:
          MSSTORE_TENANT_ID: ${{ secrets.MSSTORE_TENANT_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.MSSTORE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.MSSTORE_CLIENT_SECRET }}
          MSSTORE_SELLER_ID: ${{ secrets.MSSTORE_SELLER_ID }}
          MSSTORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
        shell: bash
        run: |
          if [ -n "$MSSTORE_TENANT_ID" ] \
             && [ -n "$MSSTORE_CLIENT_ID" ] \
             && [ -n "$MSSTORE_CLIENT_SECRET" ] \
             && [ -n "$MSSTORE_SELLER_ID" ] \
             && [ -n "$MSSTORE_PRODUCT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Microsoft Store submission skipped::MSSTORE_* secrets and/or MSSTORE_PRODUCT_ID variable not configured. Note: the first submission for a new product must be made manually via Partner Center before this job can succeed. See RELEASING.md to enable."
          fi

      - name: Download MSIX from the GitHub Release
        if: steps.check.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "kino-*-x64.msix" \
            --output kino.msix
          test -f kino.msix
          ls -la kino.msix

      - uses: microsoft/microsoft-store-apppublisher@b76227f539d68e6465f79bbbc82ed92f61081aa4 # v1.3
        if: steps.check.outputs.configured == 'true'

      - name: Configure msstore CLI
        if: steps.check.outputs.configured == 'true'
        shell: pwsh
        # `msstore reconfigure` writes the four credentials to
        # the runner's keychain for subsequent commands. They're
        # purged when the runner image is recycled.
        run: |
          msstore reconfigure `
            --tenantId ${{ secrets.MSSTORE_TENANT_ID }} `
            --sellerId ${{ secrets.MSSTORE_SELLER_ID }} `
            --clientId ${{ secrets.MSSTORE_CLIENT_ID }} `
            --clientSecret ${{ secrets.MSSTORE_CLIENT_SECRET }}

      - name: Publish MSIX to Microsoft Store
        if: steps.check.outputs.configured == 'true'
        shell: pwsh
        # `vars.MSSTORE_PRODUCT_ID` is a repo variable, not a secret —
        # zizmor flags direct template expansion into a `run:` block as
        # an injection risk. Passing through `env:` avoids the audit
        # finding and the shell quotes the value correctly.
        env:
          PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
        run: msstore publish kino.msix -id $env:PRODUCT_ID
