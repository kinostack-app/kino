name: Release Please

# release-please listens to conventional-commit messages on `main` and
# maintains a "Release PR" that bumps backend/crates/kino/Cargo.toml's
# version + writes a CHANGELOG.md entry. When the Release PR merges,
# it cuts a `vX.Y.Z` tag, which triggers `release.yml` (cargo-dist)
# and downstream `channels.yml`.
#
# Bump rules (pre-1.0, with `bump-minor-pre-major: true`):
#   feat:      → minor bump (0.1.0 → 0.2.0)
#   fix:       → patch bump (0.1.0 → 0.1.1)
#   feat!:     → minor bump (pre-1.0 reserves major for the v1 line)
#
# Once we reach 1.0.0, flip `bump-minor-pre-major` to false and `feat!`
# starts producing major bumps as SemVer intends.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR maintainer
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # `actions: write` so the dispatch step below can fire `release.yml`
    # on workflow_dispatch when release-please actually cuts a release.
    permissions:
      contents: write       # release-please creates the release + tag
      pull-requests: write  # release-please maintains the open Release PR
      actions: write        # gh workflow run dispatch on release-cut
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # Bridge GitHub's anti-recursion safety: a tag/release created
      # via GITHUB_TOKEN doesn't fire `push.tags` / `release.published`
      # downstream workflows. The carve-out is `workflow_dispatch` —
      # firing it via `gh workflow run` from GITHUB_TOKEN IS allowed,
      # and release.yml is wired to handle it the same way as a real
      # tag push (its publishing-flag computer treats `tag=v[0-9]+...`
      # input identically to `push.tags`).
      #
      # Use the manifest-mode outputs (`releases_created` plural,
      # per-path `<path>--tag_name`). The legacy `release_created`
      # (singular) is documented as a backwards-compat shim but is
      # silently empty under release-please-action 5.0.0 manifest
      # mode — v0.2.1's release was created but the dispatch step
      # was skipped, leaving the release without artefacts. Gate on
      # `releases_created` instead.
      - name: Trigger release.yml when a release is cut
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Path-scoped output key — keep in sync with the single
          # `backend/crates/kino` entry in `release-please-config.json`.
          TAG: ${{ steps.release.outputs['backend/crates/kino--tag_name'] }}
        # Pass `--ref=${TAG}` (not `main`) so the dispatched run sees
        # GITHUB_REF=refs/tags/${TAG}. release.yml's `Compute publishing
        # flag` step gates on that ref shape; without --ref the run
        # would launch against main and skip publishing. Also makes
        # workflow_run.head_branch=${TAG} downstream, which is what
        # channels.yml's guard filters on.
        run: |
          if [ -z "${TAG:-}" ]; then
            echo "::error::releases_created=true but tag is empty — check release-please-action outputs"
            exit 1
          fi
          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${TAG}" \
            -f tag="${TAG}"
