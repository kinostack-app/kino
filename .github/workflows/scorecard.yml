name: OSSF Scorecard

# Weekly + on-demand supply-chain scorecard scan. The OSSF Scorecard
# checks ~20 best-practice signals (signed releases, branch protection,
# pinned dependencies, dangerous-workflow patterns, etc.) and uploads
# results to GitHub's Code Scanning surface — they show in the
# Security tab and on a public scorecard badge users can verify.
#
# https://github.com/ossf/scorecard

on:
  schedule:
    # Sundays 06:23 UTC — keeps the scan off the weekday queue.
    - cron: "23 6 * * 0"
  push:
    branches: ["main"]
  workflow_dispatch:

# `read-all` (not `{}`) is required at workflow level so scorecard's
# internal `ListCommits` GraphQL query has the implicit `metadata: read`
# scope it needs to set up its handler. With `{}` here, every run dies
# at "internal error: ListCommits:error during graphqlHandler.setup".
# Matches `ossf/scorecard`'s own `scorecard-analysis.yml`.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload to Code Scanning
      id-token: write          # OIDC for the Scorecard action
      contents: read
      actions: read

    # SHAs match `ossf/scorecard`'s own
    # `.github/workflows/scorecard-analysis.yml` exactly. The
    # scorecard webapp (`/api/v2/projects/...`) imposter-checks
    # every step's SHA against an allowlist; using anything else
    # — even a real, current SHA from upstream — fails with
    # "imposter commit". Match the canonical example verbatim.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # required for the public scorecard.dev/viewer page

      # Keep the raw SARIF as a build artefact for 14 days so we can
      # diff regressions when a new finding lands.
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      - name: Upload to Code Scanning
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          sarif_file: results.sarif
