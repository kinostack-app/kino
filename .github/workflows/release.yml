name: Release

# Tag-triggered release pipeline driven by cargo-dist. Produces the
# Tier 1 artefacts: per-platform archives, MSI (Windows), Homebrew
# tap formula update, shell + PowerShell install scripts. macOS users
# get the shell installer + Homebrew tap (cargo-dist 0.31 has no
# `.pkg` installer). Channels cargo-dist doesn't handle natively
# (.deb, .rpm, AppImage) plug in as additional jobs that depend on
# the planner output. Cross-channel fan-out (winget, AUR, Pi image,
# Docker, Cloudflare Pages install script upload) lives in
# `channels.yml`, which fires on the GitHub Release published webhook
# so a flake in one channel doesn't block the others.
#
# See `docs/roadmap/21-cross-platform-deployment.md` §8.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
    # Plan-only on PRs — cargo-dist verifies its config without
    # publishing. Honours `pr-run-mode = "plan"` in workspace
    # metadata (`backend/Cargo.toml`).
  workflow_dispatch:
    # Manual dry-run trigger. Type a SemVer-shaped tag (e.g.
    # `v0.0.0-dryrun`, `v0.2.1-rc1`) to exercise the pipeline
    # end-to-end without pushing an actual git tag. The `publish`
    # step auto-skips when GITHUB_REF doesn't start with
    # `refs/tags/v[0-9]`. Default `v0.0.0-dryrun` keeps every
    # downstream packager happy: AppImage gets a slash-free
    # filename, MSIX's manifest passes its 4-part SemVer regex
    # after stripping the prerelease suffix.
    inputs:
      tag:
        description: "Release tag (must look like vX.Y.Z[-suffix])"
        required: true
        default: v0.0.0-dryrun
        type: string

# Workflow-level permissions are minimal (least-privilege). Each job
# overrides upward only as needed — see the `permissions:` block on
# each job below. Avoids zizmor's `excessive-permissions` rule.
permissions: {}

# Queue concurrent releases rather than racing them. Don't
# cancel-in-progress — cancelling mid-release leaves draft artefacts
# in inconsistent states.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_DIST_VERSION: v0.31.0

jobs:
  # ─────────────────────────────────────────────────────────────
  # Plan: cargo-dist computes the matrix from `[workspace.metadata.dist]`.
  # Output JSON drives the per-platform build jobs below.
  # ─────────────────────────────────────────────────────────────
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      # On `workflow_dispatch`, use the typed `tag` input
      # (slash-free, SemVer-shaped) — `github.ref_name` would
      # otherwise be the dispatch branch (e.g. `feat/foo`),
      # which contains a slash and breaks AppImage / MSIX
      # filename + version templating downstream.
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      tag-flag: ${{ steps.tag-flag.outputs.flag }}
      publishing: ${{ steps.tag-flag.outputs.publishing }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/${CARGO_DIST_VERSION}/cargo-dist-installer.sh" | sh

      - name: Compute publishing flag
        id: tag-flag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "flag=--tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "publishing=true" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "publishing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Plan
        id: plan
        working-directory: backend
        run: |
          cargo dist plan ${STEPS_TAG_FLAG_OUTPUTS_FLAG} --output-format=json > plan.json
          # plan.json is multi-line, so use heredoc syntax — `key=value`
          # only handles single-line outputs; raw JSON would corrupt the
          # outputs file.
          {
            echo "manifest<<MANIFEST_EOF"
            cat plan.json
            echo "MANIFEST_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          STEPS_TAG_FLAG_OUTPUTS_FLAG: ${{ steps.tag-flag.outputs.flag }}

      - name: Upload plan artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: artifacts-plan
          path: backend/plan.json

  # ─────────────────────────────────────────────────────────────
  # Per-platform builds. Matrix is hardcoded here (mirrors the
  # `targets` list in `[workspace.metadata.dist]`) rather than
  # parsed from the plan output, to keep this workflow legible —
  # the cargo-dist invocation still drives what's built.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: plan
    runs-on: ${{ matrix.runner }}
    # Cold cargo-dist build with thin LTO is ~10 min on Linux,
    # ~15 min on macOS aarch64. 30 caps the disaster scenario
    # (a hung CMake or wedged linker) at ~2× normal — and macOS
    # minutes are billed at 10× Linux on private repos, so a
    # runaway is expensive fast.
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            install-deps: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            install-deps: |
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          # Both macOS targets cross-compile from macos-14 (Apple
          # Silicon). macos-13 (Intel) runners are being deprecated by
          # GitHub and increasingly stall in the queue for 20+ min.
          # rustc + boring-sys2 + ring all handle aarch64 → x86_64
          # cross-compile on Apple Silicon natively.
          - target: x86_64-apple-darwin
            runner: macos-14
            install-deps: ""
          - target: aarch64-apple-darwin
            runner: macos-14
            install-deps: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            install-deps: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - name: Install platform deps
        if: matrix.install-deps != ''
        run: ${{ matrix.install-deps }}

      # boring-sys2 (transitive via wreq + veilus-fingerprint) builds
      # BoringSSL via CMake. BoringSSL's perlasm aarch64 path needs
      # `go run ./util/pregenerate` to refresh asm sources. macOS +
      # Windows runners don't preinstall Go; without it boring-sys2's
      # build script silently produces no .a files and the link step
      # fails with hundreds of undefined `_SSL_*` / `_BIO_*` symbols.
      # Linux runners ship Go but installing it here is idempotent.
      - name: Install Go (for BoringSSL asm gen)
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"
          cache: false  # zizmor cache-poisoning: per-job module cache on a tag-triggered publish workflow is unnecessary attack surface; cargo-dist's own caching covers our actual artefacts.

      # The kino binary embeds `frontend/dist/` via rust-embed
      # (see backend/crates/kino/src/spa.rs). The Rust crate's
      # build.rs runs `npm run build` if dist is missing, but that
      # adds ~30s + a Node dep to every backend build. Doing it
      # once here per matrix target with `KINO_SKIP_FRONTEND_BUILD=1`
      # below tells build.rs to trust this pre-built dist.
      - name: Set up Node.js
        # npm cache scoped to frontend/package-lock.json on a tag-
        # triggered publish workflow — same posture as setup-go
        # step above. The in-line `zizmor: ignore[cache-poisoning]`
        # directive on `uses:` is what zizmor parses (block / above-
        # line comments aren't recognised as suppressions).
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # zizmor: ignore[cache-poisoning] (v5)
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend SPA (embedded by the Rust binary)
        working-directory: frontend
        run: |
          npm ci
          npm run build
          test -f dist/index.html

      # release.yml's `on:` is `push.tags` + `workflow_dispatch` only,
      # never `pull_request` — there is no untrusted code path that
      # could populate a poisoned cache for a later trusted run to
      # restore from. The `save-if` gate below is belt-and-braces.
      - name: Cache cargo build artefacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # zizmor: ignore[cache-poisoning] (v2)
        with:
          workspaces: backend
          # Per-target key so each runner reuses its own cache across
          # release dry-runs + real tags. Subsequent builds (post
          # first warm-up) drop from ~5 min to ~1 min.
          key: ${{ matrix.target }}
          # Save the cache even when the job overall fails (e.g.
          # smoke-test step trips after a successful build) so the
          # next iteration doesn't start cold. Default is `false`,
          # which is why our earlier dry-runs kept rebuilding from
          # scratch despite the build step succeeding.
          cache-on-failure: true
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Set KINO_SKIP_FRONTEND_BUILD for the cargo step
        run: echo "KINO_SKIP_FRONTEND_BUILD=1" >> "$GITHUB_ENV"
        shell: bash

      - name: Install cargo-dist
        if: runner.os != 'Windows'
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/${CARGO_DIST_VERSION}/cargo-dist-installer.sh" | sh

      - name: Install cargo-dist (Windows)
        if: runner.os == 'Windows'
        run: |
          irm "https://github.com/axodotdev/cargo-dist/releases/download/${env:CARGO_DIST_VERSION}/cargo-dist-installer.ps1" | iex

      # `cargo-auditable = true` in [workspace.metadata.dist] embeds the
      # dependency tree into shipped binaries so `cargo audit bin` works
      # post-release. cargo-dist invokes the standalone tool — install
      # via the prebuilt-binary action so each runner adds <5s instead
      # of compiling from source.
      - name: Install cargo-auditable
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-auditable

      - name: Build
        working-directory: backend
        env:
          # Pin the macOS deployment target so native-build crates
          # (boring2 / ring) don't compile against the runner's
          # bleeding-edge SDK while rustc links against an older
          # baseline. macos-14 (Sonoma) ships SDK 14.x; setting the
          # min target to 11.0 keeps the binary compatible with every
          # macOS Big Sur+ host. Without this, `ld` complains
          # "object file was built for newer macOS version (14.5)
          # than being linked (11.0)" and fails on undefined symbols.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo dist build ${{ needs.plan.outputs.tag-flag }} --target ${{ matrix.target }}

      - name: Smoke-test the built binary
        # Native architectures only — we can't run an aarch64 binary
        # on an x86_64 runner. The aarch64 builds are smoke-tested
        # on the `ubuntu-24.04-arm` runner above; the macOS aarch64
        # build runs on `macos-14` which is itself ARM. So this
        # condition is a no-op in practice but documents the intent.
        if: matrix.target != 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail
          # cargo-dist's `[profile.dist]` writes the binary to
          # target/{target}/dist/, NOT release/. Look in both so we
          # don't break if cargo-dist ever changes that.
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            BIN=$(find backend/target -name 'kino.exe' -type f \( -path '*/dist/*' -o -path '*/release/*' \) | head -n1)
          else
            BIN=$(find backend/target -name 'kino' -type f \( -path '*/dist/*' -o -path '*/release/*' \) | head -n1)
          fi
          if [ -z "$BIN" ]; then
            echo "::error::kino binary not found under backend/target/${{ matrix.target }}/{dist,release}/"
            find backend/target -maxdepth 4 -name 'kino*' -type f
            exit 1
          fi
          echo "Smoke-testing: $BIN"
          "$BIN" --version
          "$BIN" --help > /dev/null

      - name: Upload artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            backend/target/distrib/*

  # ─────────────────────────────────────────────────────────────
  # Native Linux packages cargo-dist doesn't generate itself.
  # Reads the cargo-deb / cargo-generate-rpm metadata in
  # `crates/kino/Cargo.toml` and produces the platform packages from
  # the binaries built above.
  # ─────────────────────────────────────────────────────────────
  linux-packages:
    name: Linux packages (.deb / .rpm)
    needs: [plan, build]
    # Skip on PRs — the synthetic `${PLAN_TAG#v}` derived from
    # `github.ref_name` is `5/merge` on a PR, which breaks both the
    # .deb's `Version:` field and the smoke-test's expectation of a
    # proper systemd-startable service. Per-target compile coverage
    # is already provided by the `build` job above; this one only
    # adds value on real tag pushes (or `workflow_dispatch`
    # dry-runs, which set the tag input properly).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download Linux build artefact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist-input

      # cargo-dist's artefact is a `.tar.xz` containing
      # `kino-{target}/kino` + LICENSE etc. cargo-deb / cargo-generate-rpm
      # both run with `--no-build` and look for the raw binary at
      # `target/{target}/release/kino`, so extract the tarball into
      # the expected location.
      - name: Extract built binary into target/release/
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p "backend/target/${TARGET}/release"
          TARBALL=$(find dist-input -name "kino-${TARGET}.tar.xz" | head -n1)
          if [ -z "$TARBALL" ]; then
            echo "::error::tarball kino-${TARGET}.tar.xz not in artefact"
            ls -R dist-input
            exit 1
          fi
          tar -xJf "$TARBALL" -C dist-input
          install -Dm755 "dist-input/kino-${TARGET}/kino" \
            "backend/target/${TARGET}/release/kino"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - name: Install packagers (prebuilt — saves ~3 min vs cargo install)
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build .deb
        working-directory: backend
        # `--no-strip` because cargo-dist's `[profile.dist]` already
        # strips symbols, AND cargo-deb's strip step uses host
        # `strip` which can't process cross-arch binaries (e.g.
        # aarch64 .deb on an x86_64 runner).
        run: cargo deb -p kino --no-build --no-strip --target ${{ matrix.target }}

      - name: Build .rpm
        working-directory: backend
        run: cargo generate-rpm -p crates/kino --target ${{ matrix.target }}

      # Native-arch only — aarch64 .deb is built on an x86_64 runner
      # so `dpkg -i` can install but the binary itself can't run.
      # x86_64 catches the bug class that ate v0.2.0: the systemd
      # unit's `Environment=KINO_NO_OPEN_BROWSER=1` failing the
      # binary's clap parser, sending the service into a crash loop
      # at status=2/INVALIDARGUMENT. The poll-then-assert loop here
      # catches the same shape on every release before we cut.
      - name: Smoke-test installed .deb (systemd up + /api/v1/health reachable)
        if: matrix.arch == 'x86_64'
        working-directory: backend
        run: |
          set -euo pipefail
          # apt treats a bare relative path like `target/.../foo.deb` as
          # a *package name* rather than a local file — must be absolute
          # or `./`-prefixed.
          DEB=$(ls "target/${{ matrix.target }}/debian/"*.deb | head -n1)
          DEB=$(realpath "$DEB")
          echo "Installing $DEB"
          sudo apt-get update
          sudo apt-get install -y "$DEB"
          # cargo-deb's `start = true` triggers `systemctl start kino`
          # from the auto-generated postinst, but call it explicitly
          # too — idempotent (no-op if active) and catches any runner
          # edge case where the post-install hook silently no-ops.
          sudo systemctl start kino || true
          # Poll up to 30s for the service to come up. A crash-loop
          # surfaces here as `is-active` never going green.
          for _ in $(seq 1 15); do
            systemctl is-active --quiet kino && break
            sleep 2
          done
          if ! systemctl is-active --quiet kino; then
            echo "::error::kino.service did not reach active state"
            sudo systemctl status kino --no-pager || true
            sudo journalctl -u kino --no-pager --since '2 minutes ago' || true
            exit 1
          fi
          # /api/v1/health is unauthenticated and confirms the
          # binary is serving HTTP at all (the bug being guarded
          # against, status=2/INVALIDARGUMENT, prevents the binary
          # from ever binding the listener). Read the bound port
          # from /run/kino/port — kino writes it after the listener
          # is up, so it covers both the privileged-port success
          # path (CAP_NET_BIND_SERVICE binds 80 cleanly on the
          # GHA runner) and the 8080 fallback (when 80 is taken).
          PORT=$(sudo cat /run/kino/port 2>/dev/null || true)
          if [ -z "$PORT" ]; then
            echo "::error::kino didn't write /run/kino/port — listener never came up"
            sudo systemctl status kino --no-pager || true
            sudo journalctl -u kino --no-pager --since '2 minutes ago' || true
            exit 1
          fi
          echo "kino bound port: ${PORT}"
          curl -fsS --max-time 5 "http://localhost:${PORT}/api/v1/health" >/dev/null \
            || { echo "::error::HTTP probe failed on port ${PORT}"; sudo journalctl -u kino --no-pager | tail -50; exit 1; }
          # Cleanup: stop + purge so the runner returns to a clean
          # state (matters when GitHub re-uses the runner image).
          sudo systemctl stop kino
          sudo apt-get purge -y kino

      - name: Upload Linux package artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-packages-${{ matrix.arch }}
          path: |
            backend/target/${{ matrix.target }}/debian/*.deb
            backend/target/${{ matrix.target }}/generate-rpm/*.rpm

  # ─────────────────────────────────────────────────────────────
  # AppImage — single self-contained executable bundling the kino
  # binary + .desktop entry + icon. Distro-agnostic; works on any
  # glibc-based Linux without extra deps. Doesn't bundle ffmpeg —
  # that comes from the host (we declare a runtime requirement in
  # README + the docs). Bundling ffmpeg would push the AppImage past
  # 100 MB and we'd be on the hook for re-bundling every CVE.
  #
  # See docs/roadmap/21-cross-platform-deployment.md §"Known
  # limitations" for the ffmpeg-bundling discussion. Source layout:
  # `packaging/appimage/{AppRun,kino.desktop,kino.png}`.
  # ─────────────────────────────────────────────────────────────
  appimage:
    name: AppImage (${{ matrix.arch }})
    needs: [plan, build]
    # Skip on PRs — `kino-${PLAN_TAG#v}-${ARCH}.AppImage` becomes
    # `kino-5/merge-x86_64.AppImage` on PRs (PLAN_TAG = ref_name =
    # `5/merge`), and mksquashfs can't create a path with a slash.
    # See linux-packages above for the same rationale.
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            appimagetool: appimagetool-x86_64.AppImage
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            appimagetool: appimagetool-aarch64.AppImage
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download Linux build artefact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist-input

      - name: Install FUSE2 (appimagetool needs it on the runner)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 file desktop-file-utils

      - name: Stage AppDir layout
        env:
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          # cargo-dist's artefact is a tarball — extract first.
          TARBALL=$(find dist-input -name "kino-${TARGET}.tar.xz" | head -n1)
          if [ -z "$TARBALL" ]; then
            echo "::error::tarball kino-${TARGET}.tar.xz not in artefact"
            ls -R dist-input
            exit 1
          fi
          tar -xJf "$TARBALL" -C dist-input
          BIN="dist-input/kino-${TARGET}/kino"
          mkdir -p kino.AppDir/usr/bin
          install -Dm755 "$BIN" kino.AppDir/usr/bin/kino
          install -Dm755 packaging/appimage/AppRun kino.AppDir/AppRun
          install -Dm644 packaging/appimage/kino.desktop kino.AppDir/kino.desktop
          install -Dm644 packaging/appimage/kino.png kino.AppDir/kino.png
          # appimagetool reads .DirIcon for the embedded thumbnail.
          cp kino.AppDir/kino.png kino.AppDir/.DirIcon

      - name: Fetch appimagetool
        env:
          APPIMAGETOOL: ${{ matrix.appimagetool }}
        run: |
          curl -fsSL -o appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/${APPIMAGETOOL}"
          chmod +x appimagetool

      - name: Build AppImage
        env:
          ARCH: ${{ matrix.arch }}
          PLAN_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          # ARCH env tells appimagetool which architecture string to
          # embed in the AppImage's ELF magic + metadata.
          export ARCH
          ./appimagetool kino.AppDir "kino-${PLAN_TAG#v}-${ARCH}.AppImage"
          ls -la *.AppImage

      - name: Upload AppImage artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: appimage-${{ matrix.arch }}
          path: "*.AppImage"

  # ─────────────────────────────────────────────────────────────
  # MSIX (Microsoft Store / sideload). cargo-dist 0.31 doesn't
  # produce MSIX, so this is a hand-rolled job: download the
  # Windows artefact built above, template the manifest, run
  # `makeappx pack` from the Windows SDK (preinstalled on the
  # runner), upload to the Release.
  #
  # Not signed in CI: the Microsoft Store re-signs on submission.
  # Sideload testing on a dev machine signs locally with a
  # self-signed cert (see backend/crates/kino/msix/README.md).
  #
  # Identity values come from repo VARIABLES (not secrets — they're
  # public, displayed on the Store listing). Until the
  # MSSTORE_IDENTITY_NAME and MSSTORE_PUBLISHER_CN variables are
  # set in repo Settings, the MSIX builds with placeholder Identity
  # values; the file is structurally valid for inspection but won't
  # pass Store validation. A warning is logged in that case.
  # ─────────────────────────────────────────────────────────────
  build-msix:
    name: MSIX (x64)
    needs: [plan, build]
    # Skip on PRs — MSIX requires a four-part numeric SemVer
    # (X.Y.Z.B) for the manifest's Version attribute and a
    # slash-free filename. PLAN_TAG = ref_name = `5/merge` on PRs
    # breaks both. See linux-packages above for the same rationale.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download Windows build artefact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: artifacts-x86_64-pc-windows-msvc
          path: dist-input

      - name: Stage MSIX layout + template manifest
        shell: bash
        env:
          PLAN_TAG: ${{ needs.plan.outputs.tag }}
          IDENTITY_NAME: ${{ vars.MSSTORE_IDENTITY_NAME }}
          PUBLISHER_CN: ${{ vars.MSSTORE_PUBLISHER_CN }}
        run: |
          set -euo pipefail
          # cargo-dist 0.31 produces a .zip on Windows (not .tar.xz).
          # The archive layout is `kino-{target}/kino.exe` + LICENSE etc.
          ZIP=$(find dist-input -name "kino-x86_64-pc-windows-msvc.zip" | head -n1)
          if [ -z "$ZIP" ]; then
            echo "::error::archive kino-x86_64-pc-windows-msvc.zip not in artefact"
            ls -R dist-input
            exit 1
          fi
          unzip -q "$ZIP" -d dist-input/
          BIN=$(find dist-input -name kino.exe -type f | head -n1)
          if [ -z "$BIN" ]; then
            echo "::error::kino.exe not found in extracted archive"
            exit 1
          fi

          mkdir -p msix-stage/Assets
          cp backend/crates/kino/msix/Assets/*.png msix-stage/Assets/
          cp "$BIN" msix-stage/kino.exe
          cp backend/crates/kino/msix/appxmanifest.xml msix-stage/AppxManifest.xml

          # MSIX requires a four-part SemVer (X.Y.Z.B). cargo-dist tags
          # are three-part (vX.Y.Z); append `.0` as the build number.
          # Pre-release suffixes (-rc1, -beta) are stripped because MSIX
          # versions are pure dotted numerics.
          VERSION_RAW="${PLAN_TAG#v}"
          VERSION_NUMERIC="${VERSION_RAW%%-*}"  # strip -rc1, -beta1, etc.
          MSIX_VERSION="${VERSION_NUMERIC}.0"
          echo "Templating manifest: version=${MSIX_VERSION}"

          if [ -z "${IDENTITY_NAME}" ] || [ -z "${PUBLISHER_CN}" ]; then
            echo "::warning title=MSIX identity placeholder::MSSTORE_IDENTITY_NAME / MSSTORE_PUBLISHER_CN repo variables are not set. The MSIX builds with placeholder Identity values for inspection but will not pass Microsoft Store validation. Set these variables once Partner Center identity verification clears."
            IDENTITY_NAME="${IDENTITY_NAME:-PLACEHOLDER-PUBLISHER.Kino}"
            PUBLISHER_CN="${PUBLISHER_CN:-CN=PLACEHOLDER-PUBLISHER}"
          fi

          # sed -i works the same on the Git Bash that ships with
          # windows-latest. Three substitutions: identity name, full
          # publisher CN string, four-part version.
          sed -i \
            -e "s|PLACEHOLDER-PUBLISHER\\.Kino|${IDENTITY_NAME}|" \
            -e "s|CN=PLACEHOLDER-PUBLISHER|${PUBLISHER_CN}|" \
            -e "s|Version=\"0\\.0\\.0\\.0\"|Version=\"${MSIX_VERSION}\"|" \
            msix-stage/AppxManifest.xml

      - name: Pack MSIX
        shell: pwsh
        env:
          PLAN_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          # Locate makeappx.exe — windows-latest has the Windows SDK
          # preinstalled but the path varies by SDK version. Pick the
          # newest x64 toolchain.
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $makeappx = Get-ChildItem -Path $sdkRoot -Recurse -Filter "makeappx.exe" `
                     | Where-Object { $_.FullName -match "\\x64\\" } `
                     | Sort-Object FullName -Descending `
                     | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) { throw "makeappx.exe not found under $sdkRoot" }
          Write-Host "Using $makeappx"

          $version = $env:PLAN_TAG.TrimStart("v").Split("-")[0]
          $out = "kino-${version}-x64.msix"
          # /l: enables localised / scale-qualified asset support.
          # Without it, MakeAppx's semantic validation requires a
          # base StoreLogo.png alongside StoreLogo.scale-100.png
          # etc. We ship only the scale-qualified variants (cleaner
          # for Store ingestion), so /l is required.
          & $makeappx pack /l /d msix-stage /p $out /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx pack exit $LASTEXITCODE" }
          Get-Item $out | Format-List Length, FullName

      - name: Upload MSIX artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: msix-x64
          path: "*.msix"

  # ─────────────────────────────────────────────────────────────
  # Publish: collect every artefact, attach to the GitHub Release.
  # cargo-dist's `host` step also runs the Homebrew tap formula
  # bump and the shell-installer upload. Skipped on PR builds.
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Publish to GitHub Release
    if: needs.plan.outputs.publishing == 'true'
    needs: [plan, build, linux-packages, appimage, build-msix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # write the GitHub Release + tag
      id-token: write       # OIDC for sigstore + cargo-dist publish
      attestations: write   # SLSA build attestations
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # cargo-dist's `host` step expects archives + plan.json at
      # `<workspace-root>/target/distrib/` (where the build matrix
      # produced them). It runs from `backend/` (the workspace root)
      # so the artefacts must land at `backend/target/distrib/`.
      # Filtering by `pattern: artifacts-*` excludes the linux-package
      # + appimage artefacts (those go into `dist/` for softprops).
      - name: Download cargo-dist build artefacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: artifacts-*
          path: backend/target/distrib
          merge-multiple: true

      - name: Download linux package + AppImage artefacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: linux-packages-*
          path: dist
          merge-multiple: true

      - name: Download AppImage artefacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: appimage-*
          path: dist
          merge-multiple: true

      - name: Download MSIX artefact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: msix-x64
          path: dist

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            "https://github.com/axodotdev/cargo-dist/releases/download/${CARGO_DIST_VERSION}/cargo-dist-installer.sh" | sh

      - name: cargo-dist host (create release + upload archives + formula bump)
        # `--steps=create` creates the GitHub Release record (was
        # missing until v0.3.0; without it cargo-dist's upload step
        # has no release to upload TO and silently no-ops, leaving
        # the tarballs/.msi/sha256.sum off the release. softprops
        # below would then create the release as a side-effect of
        # uploading our hand-extension artefacts, but cargo-dist's
        # native artefacts were never published).
        # `--steps=upload` then uploads everything in target/distrib.
        # `--steps=release` un-drafts the release.
        # cargo-dist gracefully no-ops the formula push when
        # `HOMEBREW_TAP_TOKEN` is empty — the rest of the host step
        # (archive upload + GitHub Release create) still runs. So
        # releases work end-to-end even before the homebrew tap +
        # PAT are configured; the formula bump just doesn't happen
        # until the secret exists. See RELEASING.md for the
        # one-time setup.
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NEEDS_PLAN_OUTPUTS_TAG_FLAG: ${{ needs.plan.outputs.tag-flag }}
        run: |
          cargo dist host ${NEEDS_PLAN_OUTPUTS_TAG_FLAG} \
            --steps=create --steps=upload --steps=release

      # Upload everything to the GitHub Release in one shot:
      # - cargo-dist's native artefacts from backend/target/distrib/
      #   (5 tarballs + .sha256s, .msi + .sha256, sha256.sum,
      #   kino-installer.sh / .ps1, kino.rb formula). These don't get
      #   uploaded by `cargo dist host` because that command's GitHub
      #   path is a stub (host.rs: "implemented in CI backend"); the
      #   actual upload is the workflow's responsibility.
      # - Our hand-extension artefacts from dist/ (.deb / .rpm /
      #   AppImage / .msix). These were the only ones uploaded
      #   pre-v0.3.1; the cargo-dist set was silently missing.
      - name: Attach all artefacts to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          files: |
            backend/target/distrib/*.tar.xz
            backend/target/distrib/*.tar.xz.sha256
            backend/target/distrib/*.zip
            backend/target/distrib/*.zip.sha256
            backend/target/distrib/*.msi
            backend/target/distrib/*.msi.sha256
            backend/target/distrib/source.tar.gz
            backend/target/distrib/source.tar.gz.sha256
            backend/target/distrib/sha256.sum
            backend/target/distrib/kino-installer.sh
            backend/target/distrib/kino-installer.ps1
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.AppImage
            dist/**/*.msix
